<div class="login-page">
  <mat-card class="login-card">
    <div class="login-head">
      <h2 class="login-title">Login untuk mengakses fitur</h2>
      <p class="login-sub">Masukkan username dan password untuk melanjutkan</p>
    </div>

    <div class="login-field">
      <label for="usernameInput" class="login-label">Username</label>
      <input
        [(ngModel)]="usernameInput"
        name="usernameInput"
        type="text"
        class="login-input"
        id="usernameInput"
        placeholder="Masukkan Username"
        autocomplete="username"
      />
    </div>

    <div class="login-field">
      <label for="passwordInput" class="login-label">Password</label>
      <input
        [(ngModel)]="passwordInput"
        name="passwordInput"
        type="password"
        class="login-input"
        id="passwordInput"
        placeholder="Masukkan Password"
        autocomplete="current-password"
      />
    </div>

    @if (loginError) {
      <div class="tool-error" role="alert">{{ loginError }}</div>
    }

    <button type="button" class="login-btn" (click)="loginAction()">
      Login
    </button>
  </mat-card>
</div>

<div class="container pt-3 pb-3 d-flex flex-column align-items-center"  >
    <mat-card class="example-card w-50 mb-3 mat-elevation-z5 p-4" style="border-radius: 24px; background-color: white;">
        <div>
            <h2 class="m-0" style="color: #144E83; font-family: 'Open Sans'; font-weight: 700;">
                Login untuk mengakses fitur
            </h2>
            <h4 style="color: #495057; font-family: 'Open Sans'; font-weight: 400;">
                Masukkan username dan password untuk melanjutkan
            </h4>
        </div>
        <div class="d-flex flex-column w-100 mt-5 gap-2">
            <label for="usernameInput" class="font-general" style="color: #144E83; font-family: 'Open Sans'; font-weight: 600; font-size: 16px; margin-right: 24px;">
                Username
            </label>
            <input [(ngModel)]="usernameInput" name="usernameInput"  type="text" class="form-control input-text-field" id="usernameInput" placeholder="Masukkan Username">
        </div>
        <div class="d-flex flex-column w-100 mt-4 gap-2">
            <label for="passwordInput" class="font-general" style="color: #144E83; font-family: 'Open Sans'; font-weight: 600; font-size: 16px; margin-right: 24px;">
                Password
            </label>
            <input [(ngModel)]="passwordInput" name="passwordInput" type="password" class="form-control input-text-field" id="passwordInput" placeholder="Masukkan Password">
        </div>
        <div style="width: 100%; max-width: 100%;" class="d-flex flex-column align-items-center mt-3">
            <button class="login-btn" (click)="loginAction()">Login</button>
        </div>
    </mat-card>
</div>

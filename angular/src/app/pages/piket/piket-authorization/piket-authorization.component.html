<div class="container pt-3 pb-3 d-flex flex-column align-items-center">
  <mat-card
    class="example-card w-100 mb-3 mat-elevation-z5 p-4"
    style="border-radius: 24px; background-color: white"
  >
    <div>
      <h2
        class="m-0"
        style="
          color: #144e83;
          font-family: &quot;Open Sans&quot;;
          font-weight: 700;
        "
      >
        Login untuk mengakses fitur Piket
      </h2>
      <h4
        style="
          color: #495057;
          font-family: &quot;Open Sans&quot;;
          font-weight: 400;
        "
      >
        Masukkan password untuk melanjutkan
      </h4>
    </div>
    <div class="d-flex flex-column w-100 mt-4 mb-4 gap-2">
      <label
        for="passwordInput"
        class="font-general"
        style="
          color: var(--msv-primary, #144e83);
          font-family: &quot;Open Sans&quot;;
          font-weight: 600;
          font-size: 16px;
          margin-right: 24px;
        "
      >
        Password
      </label>
      <input
        [(ngModel)]="passwordInput"
        name="passwordInput"
        type="password"
        class="form-control input-text-field"
        id="passwordInput"
        placeholder="Masukkan Password"
        aria-label="Password"
      />
    </div>
    @if (loginError) {
      <div class="tool-error w-100 mt-2" role="alert">{{ loginError }}</div>
    }
    <div
      style="width: 100%; max-width: 100%"
      class="d-flex flex-column align-items-center mt-3"
    >
      <button class="login-btn" (click)="loginAction()" aria-label="Masuk">
        Masuk
      </button>
    </div>
  </mat-card>
</div>

<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">Number Base Converter</h2>
    <h4 class="tool-sub">Konversi biner / oktal / desimal / heksadesimal (mendukung angka besar via BigInt).</h4>
    <div class="tool-divider"></div>

    <div class="bc-input">
      <input class="bc-field" [(ngModel)]="input" (ngModelChange)="convert()" placeholder="Masukkan angka..." />
      <select [(ngModel)]="fromBase" (ngModelChange)="convert()" class="bc-select">
        <option *ngFor="let b of bases" [value]="b.value">{{ b.label }}</option>
      </select>
    </div>

    <div class="tool-error" *ngIf="error">{{ error }}</div>

    <div class="bc-out" *ngIf="!error">
      <div class="bc-row">
        <span class="bc-label">BIN</span>
        <input class="bc-val" [value]="bin" readonly />
        <button class="icon-btn" (click)="copy(bin)"><mat-icon>file_copy</mat-icon></button>
      </div>
      <div class="bc-row">
        <span class="bc-label">OCT</span>
        <input class="bc-val" [value]="oct" readonly />
        <button class="icon-btn" (click)="copy(oct)"><mat-icon>file_copy</mat-icon></button>
      </div>
      <div class="bc-row">
        <span class="bc-label">DEC</span>
        <input class="bc-val" [value]="dec" readonly />
        <button class="icon-btn" (click)="copy(dec)"><mat-icon>file_copy</mat-icon></button>
      </div>
      <div class="bc-row">
        <span class="bc-label">HEX</span>
        <input class="bc-val" [value]="hex" readonly />
        <button class="icon-btn" (click)="copy(hex)"><mat-icon>file_copy</mat-icon></button>
      </div>
    </div>
  </mat-card>
</div>

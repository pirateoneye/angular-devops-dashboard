<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">Color Converter</h2>
    <h4 class="tool-sub">Konversi antara HEX, RGB, dan HSL + preview.</h4>
    <div class="tool-divider"></div>

    <div class="cc-top">
      <div class="cc-swatch" [style.background]="hex"></div>
      <input type="color" [value]="hex" (input)="onPicker($event)" class="cc-picker" />
    </div>

    <div class="cc-row">
      <label class="tool-label">HEX</label>
      <div class="cc-line">
        <input class="cc-input-mono" [(ngModel)]="hex" (ngModelChange)="fromHex()" />
        <button class="icon-btn" (click)="copy(hex)"><mat-icon>file_copy</mat-icon></button>
      </div>
    </div>

    <div class="cc-row">
      <label class="tool-label">RGB</label>
      <div class="cc-rgb">
        <input type="number" [(ngModel)]="r" (ngModelChange)="fromRgb()" min="0" max="255" class="cc-num" /> 
        <input type="number" [(ngModel)]="g" (ngModelChange)="fromRgb()" min="0" max="255" class="cc-num" /> 
        <input type="number" [(ngModel)]="b" (ngModelChange)="fromRgb()" min="0" max="255" class="cc-num" />
        <button class="icon-btn" (click)="copy(rgbStr)"><mat-icon>file_copy</mat-icon></button>
      </div>
    </div>

    <div class="cc-row">
      <label class="tool-label">HSL</label>
      <div class="cc-rgb">
        <input type="number" [(ngModel)]="h" (ngModelChange)="fromHsl()" min="0" max="360" class="cc-num" />
        <input type="number" [(ngModel)]="s" (ngModelChange)="fromHsl()" min="0" max="100" class="cc-num" />
        <input type="number" [(ngModel)]="l" (ngModelChange)="fromHsl()" min="0" max="100" class="cc-num" />
        <button class="icon-btn" (click)="copy(hslStr)"><mat-icon>file_copy</mat-icon></button>
      </div>
    </div>

    <div class="tool-error" *ngIf="error">{{ error }}</div>
  </mat-card>
</div>

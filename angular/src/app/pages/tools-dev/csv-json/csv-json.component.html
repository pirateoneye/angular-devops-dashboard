<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">CSV &harr; JSON</h2>
    <h4 class="tool-sub">Konversi dua arah CSV &amp; JSON, dukung delimiter kustom, header, dan tipe data otomatis.</h4>
    <div class="tool-divider"></div>

    <div class="cj-opts">
      <div class="cj-dir">
        <label><input type="radio" [(ngModel)]="direction" value="csv2json" (change)="convert()" /> CSV &rarr; JSON</label>
        <label><input type="radio" [(ngModel)]="direction" value="json2csv" (change)="convert()" /> JSON &rarr; CSV</label>
        <button class="btn-secondary cj-swap" (click)="swap()"><mat-icon style="vertical-align:middle;font-size:16px" aria-hidden="true">swap_horiz</mat-icon> Tukar</button>
      </div>
      <div class="cj-row">
        <label>Delimiter
          <select [(ngModel)]="delimiter" (change)="convert()">
            <option value=",">Koma ,</option>
            <option value=";">Titik koma ;</option>
            <option value="\t">Tab</option>
            <option value="|">Pipe |</option>
            <option value="custom">Custom</option>
          </select>
        </label>
        @if (delimiter==='custom') {
          <input class="tool-input-mono" [(ngModel)]="customDelimiter" (ngModelChange)="convert()" placeholder=";" style="width:60px" aria-label="Custom delimiter" />
        }
        <label><input type="checkbox" [(ngModel)]="hasHeader" (change)="convert()" /> Header</label>
        <label><input type="checkbox" [(ngModel)]="pretty" (change)="convert()" /> Pretty</label>
      </div>
    </div>

    <div class="jf-grid">
      <div>
        <label class="tool-label" for="cj-input">{{ direction === 'csv2json' ? 'CSV Input' : 'JSON Input' }}</label>
        <textarea id="cj-input" class="tool-area" rows="14" [(ngModel)]="input" (ngModelChange)="convert()" placeholder='{{ direction==="csv2json" ? "a,b,c\n1,2,3" : "[{\"a\":1}]" }}'></textarea>
      </div>
      <div>
        <label class="tool-label" for="cj-output">Output</label>
        <textarea id="cj-output" class="tool-area" rows="14" [value]="output" readonly placeholder="Hasil..."></textarea>
        @if (output) {
          <button class="copy-btn" (click)="copyOutput()" title="Copy" aria-label="Copy output">
            <mat-icon aria-hidden="true">file_copy</mat-icon>
          </button>
        }
      </div>
    </div>

    <div class="tool-actions">
      <button class="btn-primary" (click)="convert()">Konversi</button>
      <button class="btn-secondary" (click)="clear()">Clear</button>
      @if (stats) {
        <span class="tool-stats">{{ stats }}</span>
      }
    </div>

    @if (error) {
      <div class="tool-error" role="alert">{{ error }}</div>
    }
  </mat-card>
</div>

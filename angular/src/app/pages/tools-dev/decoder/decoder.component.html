<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">Decoder</h2>
    <h4 class="tool-sub">Encode / decode Base64, URL, dan decode JWT.</h4>
    <div class="tool-divider"></div>

    <div class="dec-modes">
      <button *ngFor="let m of modes" class="dec-mode" [class.active]="mode === m.key" (click)="mode = m.key; clear()">
        {{ m.label }}
      </button>
    </div>

    <div class="jf-grid">
      <div>
        <label class="tool-label">Input</label>
        <textarea class="tool-area" rows="10" [(ngModel)]="input" placeholder="Tempel teks atau token..."></textarea>
      </div>
      <div>
        <label class="tool-label">Output</label>
        <textarea class="tool-area" rows="10" [value]="output" readonly placeholder="Hasil..."></textarea>
        <button class="copy-btn" (click)="copyOutput()" *ngIf="output" title="Copy">
          <mat-icon>file_copy</mat-icon>
        </button>
      </div>
    </div>

    <div class="tool-actions">
      <button class="btn-primary" (click)="encode()" [disabled]="mode === 'jwt'">Encode</button>
      <button class="btn-primary" (click)="decode()">Decode</button>
      <button class="btn-secondary" (click)="clear()">Clear</button>
    </div>

    <div class="tool-error" *ngIf="error">{{ error }}</div>
  </mat-card>
</div>

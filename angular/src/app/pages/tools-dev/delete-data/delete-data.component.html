<div class="container pt-3 pb-3">
    <mat-card class="example-card mb-3 mat-elevation-z5 p-4" style="border-radius: 16px">
        <h2 class="m-0" style="color: #144E83; font-family: 'Open Sans'; font-weight: 700;">
            Delete Data
        </h2>
        <h4 style="color: #495057; font-family: 'Open Sans'; font-weight: 400;">
            Tools untuk menghapus data di environment UAT
        </h4>

        <div style="width: 100%; height: 1px; background-color: #E9ECEF; padding: 0; margin: 0;"></div>

        <div class="batch-list-card">
            <div class="d-flex row">
                <h3 class="col-4 m-0" style="color: #144E83; font-family: 'Open Sans'; font-weight: 700;">
                    Jenis Data
                </h3>
            </div>
            <div class="d-flex row  mt-2 mb-4" style="padding-right: 0px;">
                <div class="col-12" style="padding-right: 0px;">
                    <select class="select-key" [(ngModel)]="submissionType" (change)="onChangeSubmissionType()">
                        <option value="kelola-toko">Kelola Toko</option>
                        <option value="merchant-baru">Merchant baru</option>
                        <option value="riplay">RIPLAY</option>
                    </select>
                </div>
            </div>

            <div class="d-flex row">
                <h3 class="col-4 m-0" style="color: #144E83; font-family: 'Open Sans'; font-weight: 700;">
                    Target
                </h3>
            </div>
            <div class="d-flex row  mt-2 mb-4" style="padding-right: 0px;">
                <div class="col-12" style="padding-right: 0px;">
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <select class="select-target" [(ngModel)]="deleteBy">
                                <option *ngFor="let opt of option[submissionType]" [value]="opt">{{placeholder[opt]}}</option>
                            </select>
                        </div>
                        <input type="text" class="form-control " placeholder="Target" [(ngModel)]="deleteValue">
                    </div>
                </div>
            </div>

            <div class="information" *ngIf="response.status != null">
                <div class="d-flex align-items-center">
                    <mat-icon style="color: #005CAA">
                        info
                    </mat-icon>
                    <h4
                        style="color: #005CAA; font-family: 'Open Sans';  margin: 0; margin-left: 10px;">
                        Delete Data <b>{{placeholder[response.submissionType]}}</b> By <b>{{placeholder[response.deleteBy]}} {{response.deleteValue}}</b>
                    </h4>
                </div>

                <div class="d-flex align-items-center mt-3">
                    <mat-icon style="color: #005CAA">
                        message
                    </mat-icon>
                    <h4
                        style="color: #005CAA; font-family: 'Open Sans';  margin: 0; margin-left: 10px;">
                        Response : {{response.message || '-'}}
                    </h4>
                </div>

                <div class="d-flex align-items-center mt-3">
                    <mat-icon style="color: #005CAA">
                        batch_prediction
                    </mat-icon>
                    <div *ngIf="response.status == 'SUCCESS'" class="badge-available" style="margin-left: 10px;">
                        Success
                      </div>
                      <div *ngIf="response.status == 'ERROR'" class="badge-failed" style="margin-left: 10px;">
                        Error
                      </div>
                      <div *ngIf="response.status == 'ON_PROCESS'" class="badge-unavailable" style="margin-left: 10px;">
                        On Running
                      </div>
                </div>
            </div>

            <div class="d-flex row mb-4" style="margin-top: 50px;">
                <div class="col-12">
                    <button style="width: 100%;" class="button-danger" [class.button-danger-disabled]="response.status == 'ON_PROCESS'" [disabled]="response.status == 'ON_PROCESS'" (click)="onClickDeleteButton()">Delete</button>
                </div>
            </div>
        </div>
    </mat-card>
</div>

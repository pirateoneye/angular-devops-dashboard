<div class="gl-page">
  <header class="gl-header">
    <div class="gl-brand">
      <mat-icon class="gl-logo" aria-hidden="true">merge_type</mat-icon>
      <div>
        <h1>GitLab Tools</h1>
        <p>Pantau tag &amp; jalankan operasi bulk antar proyek</p>
      </div>
    </div>
    <div class="gl-head-right">
      @if (isAuth()) {
        <code class="gl-token" [title]="maskedToken()">{{ maskedToken() }}</code>
        <button class="gl-icon-btn" (click)="logout()" title="Disconnect" aria-label="Disconnect">
          <mat-icon aria-hidden="true">logout</mat-icon>
        </button>
      }
    </div>
  </header>

  @if (!isAuth()) {
    <gl-connect />
  } @else {
    <div class="gl-subbar">
      <label class="gl-group-select" for="gl-group-select">
        <span class="gl-mute">Group</span>
        <select id="gl-group-select" class="gl-input" [value]="groupId()" (change)="onGroupChange(+$any($event.target).value)">
          <option [value]="991">Merchant Services</option>
        </select>
      </label>
      <button class="gl-icon-btn" (click)="refresh()" title="Refresh projects" aria-label="Refresh projects" [disabled]="loading()">
        <mat-icon aria-hidden="true">refresh</mat-icon>
      </button>

      <nav class="gl-tabs" role="tablist">
        <button role="tab" class="gl-tab" [class.active]="view() === 'dashboard'" (click)="goToView('dashboard')">
          <mat-icon>dashboard</mat-icon> Dashboard
        </button>
        <button role="tab" class="gl-tab" [class.active]="view() === 'tags'" (click)="goToView('tags')">
          <mat-icon>label</mat-icon> Tags
        </button>
        <button role="tab" class="gl-tab" [class.active]="view() === 'bulk'" (click)="goToView('bulk')">
          <mat-icon>batch_prediction</mat-icon> Bulk
        </button>
      </nav>
    </div>

    @if (view() === 'dashboard') {
      <gl-dashboard (projectSelected)="setProjectIds($event)" />
    } @else if (view() === 'tags') {
      <gl-tags [selectedIds]="selectedProjectIds()" />
    } @else if (view() === 'bulk') {
      <gl-bulk [preselectedIds]="selectedProjectIds()" />
    }

    <gl-activity />
  }
</div>

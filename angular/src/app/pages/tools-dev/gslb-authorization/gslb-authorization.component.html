<div class="gslb-auth">
  <div class="auth-card">
    <div class="auth-ico"><mat-icon>dns</mat-icon></div>
    <h1>GSLB / DNS Console</h1>
    <p class="muted">Masukkan username &amp; password gege.com Anda.</p>

    <div class="field">
      <label for="gslbUser">Username</label>
      <input
        [(ngModel)]="username"
        name="username"
        type="text"
        id="gslbUser"
        placeholder="Masukkan username"
        autocomplete="username"
        aria-label="Username"
        (keydown.enter)="loginAction()"
      />
    </div>

    <div class="field">
      <label for="gslbPass">Password</label>
      <div class="auth-pw-wrap">
        <input
          [(ngModel)]="password"
          name="password"
          [type]="showPassword() ? 'text' : 'password'"
          id="gslbPass"
          placeholder="Masukkan password"
          autocomplete="current-password"
          aria-label="Password"
          (keydown.enter)="loginAction()"
          autofocus
        />
        <button
          type="button"
          class="auth-eye"
          (click)="showPassword.set(!showPassword())"
          [attr.aria-label]="showPassword() ? 'Sembunyikan password' : 'Tampilkan password'"
        >
          <mat-icon aria-hidden="true">{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <label class="chk">
      <input type="checkbox" name="remember" [(ngModel)]="remember" />
      Remember on this device
    </label>

    @if (loginError) {
      <div class="err" role="alert">{{ loginError }}</div>
    }

    <button
      class="btn-primary"
      (click)="loginAction()"
      [disabled]="submitting"
      aria-label="Masuk"
    >
      {{ submitting ? "Memeriksa…" : "Masuk" }}
    </button>
  </div>
</div>

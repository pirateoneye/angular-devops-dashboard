<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">ID &amp; Timestamp Generator</h2>
    <h4 class="tool-sub">Generate UUID v4 dan lihat timestamp saat ini.</h4>
    <div class="tool-divider"></div>

    <h3 class="tool-section">UUID v4</h3>
    <div class="id-row">
      <input class="tool-input-mono" [value]="uuid" readonly />
      <button class="icon-btn" (click)="copy(uuid)" title="Copy" aria-label="Copy UUID"><mat-icon aria-hidden="true">file_copy</mat-icon></button>
    </div>

    <div class="tool-actions">
      <label class="id-count-label">Jumlah:
        <input type="number" class="id-count" [value]="uuidCount" (input)="uuidCount = +$any($event.target).value" min="1" max="50" />
      </label>
      <button class="btn-primary" (click)="generate()">Generate</button>
      @if (uuids.length > 1) {
        <button class="btn-secondary" (click)="copy(uuids.join('\n'))">Copy all</button>
      }
    </div>

    @if (uuids.length > 1) {
      <div class="id-list">
        @for (u of uuids; track $index) {
          <div class="id-list-item">
            <span class="rt-mono">{{ u }}</span>
            <button class="icon-btn small" (click)="copy(u)" title="Copy" aria-label="Copy UUID"><mat-icon aria-hidden="true">content_copy</mat-icon></button>
          </div>
        }
      </div>
    }

    <h3 class="tool-section">Timestamp</h3>
    <div class="ts-grid">
      <div class="ts-item">
        <label class="tool-label">Epoch (ms)</label>
        <div class="id-row">
          <input class="tool-input-mono" [value]="nowMs" readonly />
          <button class="icon-btn" (click)="copy(nowMs)" aria-label="Copy epoch milliseconds"><mat-icon aria-hidden="true">file_copy</mat-icon></button>
        </div>
      </div>
      <div class="ts-item">
        <label class="tool-label">Epoch (sec)</label>
        <div class="id-row">
          <input class="tool-input-mono" [value]="nowSec" readonly />
          <button class="icon-btn" (click)="copy(nowSec)" aria-label="Copy epoch seconds"><mat-icon aria-hidden="true">file_copy</mat-icon></button>
        </div>
      </div>
      <div class="ts-item">
        <label class="tool-label">ISO 8601 (UTC)</label>
        <div class="id-row">
          <input class="tool-input-mono" [value]="nowIso" readonly />
          <button class="icon-btn" (click)="copy(nowIso)" aria-label="Copy ISO timestamp"><mat-icon aria-hidden="true">file_copy</mat-icon></button>
        </div>
      </div>
      <div class="ts-item">
        <label class="tool-label">Local</label>
        <div class="id-row">
          <input class="tool-input-mono" [value]="nowLocal" readonly />
          <button class="icon-btn" (click)="copy(nowLocal)" aria-label="Copy local timestamp"><mat-icon aria-hidden="true">file_copy</mat-icon></button>
        </div>
      </div>
    </div>

    <div class="tool-actions">
      <button class="btn-primary" (click)="refreshTime()">Refresh time</button>
    </div>
  </mat-card>
</div>

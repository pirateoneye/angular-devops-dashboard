<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">JSON Formatter</h2>
    <h4 class="tool-sub">Format, minify, dan validasi JSON.</h4>
    <div class="tool-divider"></div>

    <div class="jf-grid">
      <div>
        <label class="tool-label">Input</label>
        <textarea class="tool-area" rows="14" [(ngModel)]="input" placeholder='{"hello":"world"}'></textarea>
      </div>
      <div>
        <label class="tool-label">Output</label>
        <textarea class="tool-area" rows="14" [value]="output" readonly placeholder="Hasil..."></textarea>
        @if (output) {
          <button class="copy-btn icon-btn" (click)="copyOutput()" title="Copy" aria-label="Copy output">
            <mat-icon aria-hidden="true">file_copy</mat-icon>
          </button>
        }
      </div>
    </div>

    <div class="tool-actions">
      <button class="btn-primary" (click)="format()">Format</button>
      <button class="btn-primary" (click)="minify()">Minify</button>
      <button class="btn-secondary" (click)="validate()">Validate</button>
      <button class="btn-secondary" (click)="clear()">Clear</button>
      @if (stats) {
        <span class="tool-stats">{{ stats }}</span>
      }
    </div>

    @if (error) {
      <div class="tool-error" role="alert">{{ error }}</div>
    }
  </mat-card>
</div>

<div class="container pt-2 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">Lorem Ipsum Generator</h2>
    <h4 class="tool-sub">Buat teks placeholder (paragraf / kalimat).</h4>
    <div class="tool-divider"></div>
    <div class="li-options">
      <label class="li-field">Paragraf: <input type="number" [(ngModel)]="paragraphs" min="1" max="20" class="li-num" /></label>
      <label class="li-field">Kalimat/paragraf: <input type="number" [(ngModel)]="sentencesPer" min="1" max="15" class="li-num" /></label>
      <label class="li-field"><input type="checkbox" [(ngModel)]="startLorem" /> Mulai "Lorem ipsum..."</label>
    </div>
    <div class="tool-actions">
      <button class="btn-primary" (click)="generate()">Generate</button>
      <button class="btn-secondary" (click)="copy()" [disabled]="!output">Copy</button>
    </div>
    <textarea class="tool-area" rows="10" [value]="output" readonly placeholder="Hasil..."></textarea>
  </mat-card>
</div>

<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">Password Generator</h2>
    <h4 class="tool-sub">Buat password acak aman (crypto.getRandomValues).</h4>
    <div class="tool-divider"></div>

    <div class="pg-options">
      <label class="pg-field">Panjang: <input type="number" [(ngModel)]="length" min="4" max="128" class="pg-num" /></label>
      <label class="pg-field">Jumlah: <input type="number" [(ngModel)]="count" min="1" max="50" class="pg-num" /></label>
    </div>
    <div class="pg-toggles">
      <mat-slide-toggle [(ngModel)]="useUpper">A-Z</mat-slide-toggle>
      <mat-slide-toggle [(ngModel)]="useLower">a-z</mat-slide-toggle>
      <mat-slide-toggle [(ngModel)]="useDigits">0-9</mat-slide-toggle>
      <mat-slide-toggle [(ngModel)]="useSymbols">Simbol</mat-slide-toggle>
      <mat-slide-toggle [(ngModel)]="excludeAmbiguous">Buang ambigu (Il1O0o)</mat-slide-toggle>
    </div>

    <div class="tool-actions">
      <button class="btn-primary" (click)="generate()">Generate</button>
    </div>

    @if (passwords.length) {
      <div class="pg-list">
        @for (p of passwords; track $index) {
          <div class="pg-row">
            <input class="pg-val" [value]="p" readonly />
            <span class="pg-strength" [style.color]="strength(p).pct >= 80 ? '#137a43' : strength(p).pct >= 50 ? '#8a5a12' : '#cd1923'">{{ strength(p).label }}</span>
            <button class="icon-btn" (click)="copy(p)" title="Copy" aria-label="Copy password"><mat-icon aria-hidden="true">file_copy</mat-icon></button>
          </div>
        }
      </div>
    }
  </mat-card>
</div>

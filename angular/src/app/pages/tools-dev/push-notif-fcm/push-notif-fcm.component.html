<div class="container pt-3 pb-3">
  <mat-card class="example-card mb-3 mat-elevation-z5 p-4" style="border-radius: 16px">
    <h2 class="m-0" style="color: #144E83; font-family: 'Open Sans'; font-weight: 700;">
      Push Notifikasi dengan FCM
    </h2>
    <h4 style="color: #495057; font-family: 'Open Sans'; font-weight: 400;">
      Tools untuk melakukan push notifikasi via FCM
    </h4>

    <div style="width: 100%; height: 1px; background-color: #E9ECEF; padding: 0; margin: 0;"></div>

    <div class="batch-list-card">
      <div class="d-flex row">
        <h3 class="col-4 m-0" style="color: #144E83; font-family: 'Open Sans'; font-weight: 700;">
          Environment
        </h3>
        <div class="d-flex row  mt-2 mb-2" style="padding-right: 0px;">
          <div class="col-12" style="padding-right: 0px;">
            <select [(ngModel)]="env" class="select-key">
              <option value="UAT">UAT</option>
            </select>
          </div>
        </div>
      </div>

    </div>

    <div class="batch-list-card">
      <div class="d-flex row">
        <h3 class="col-4 m-0" style="color: #144E83; font-family: 'Open Sans'; font-weight: 700;">
          Request Body
        </h3>
      </div>
      <div class="d-flex row  mt-2 mb-3">
        <div class="col-12">
          <textarea style="width: 100%;" class="form-control" placeholder="Input" rows="10"
            [(ngModel)]="requestBody"></textarea>
        </div>
      </div>
      <div class="d-flex row mt-2 mb-2">
        <div class="col-12">
          <button style="width: 100%;" class="button-primary" (click)="submit()">Submit</button>
        </div>
      </div>
    </div>

    <div class="information" *ngIf="response.status != null">
      <div class="d-flex align-items-center mt-3">
        <mat-icon style="color: #005CAA">
            batch_prediction
        </mat-icon>
        <div *ngIf="response.status == 'SUCCESS'" class="badge-available" style="margin-left: 10px;">
            Success
          </div>
          <div *ngIf="response.status == 'ERROR'" class="badge-failed" style="margin-left: 10px;">
            Error
          </div>
          <div *ngIf="response.status == 'ON_PROCESS'" class="badge-unavailable" style="margin-left: 10px;">
            On Running
          </div>
    </div>

      <div class="d-flex align-items-center mt-3">
          <mat-icon style="color: #005CAA">
              message
          </mat-icon>
          <h4 style="color: #005CAA; font-family: 'Open Sans';  margin: 0; margin-left: 10px;">
              Response : {{response.message || '-'}}
          </h4>
      </div>


      <div *ngIf="response.data != null">
          <div class="d-flex align-items-center mt-3 mb-3">
              <mat-icon style="color: #005CAA">
                  notes
              </mat-icon>
              <h4 style="color: #005CAA; font-family: 'Open Sans';  margin: 0; margin-left: 10px;">
                  Response Data:
              </h4>
          </div>
          <div class="d-flex align-items-center response-data">
              <pre>{{response.data | json }}</pre>
          </div>
      </div>
  </div>



  </mat-card>
</div>

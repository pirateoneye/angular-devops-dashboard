<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">Text Transforms</h2>
    <h4 class="tool-sub">Ubah case, sort/dedupe baris, escape, hitung jumlah.</h4>
    <div class="tool-divider"></div>

    <label class="tool-label">Input</label>
    <textarea class="tool-area" rows="7" [(ngModel)]="input" (ngModelChange)="computeStats()" placeholder="Tempel teks..."></textarea>
    <div class="tt-stats" *ngIf="stats">{{ stats }}</div>

    <div class="tt-buttons">
      <button class="tt-btn" (click)="upper()">UPPERCASE</button>
      <button class="tt-btn" (click)="lower()">lowercase</button>
      <button class="tt-btn" (click)="title()">Title Case</button>
      <button class="tt-btn" (click)="camel()">camelCase</button>
      <button class="tt-btn" (click)="snake()">snake_case</button>
      <button class="tt-btn" (click)="kebab()">kebab-case</button>
      <button class="tt-btn" (click)="sortAsc()">Sort A-Z</button>
      <button class="tt-btn" (click)="sortDesc()">Sort Z-A</button>
      <button class="tt-btn" (click)="dedupe()">Dedupe</button>
      <button class="tt-btn" (click)="trimLines()">Trim baris</button>
      <button class="tt-btn" (click)="removeBlank()">Hapus kosong</button>
      <button class="tt-btn" (click)="reverseLines()">Reverse baris</button>
      <button class="tt-btn" (click)="reverseText()">Reverse teks</button>
      <button class="tt-btn" (click)="escapeHtml()">Escape HTML</button>
      <button class="tt-btn" (click)="unescapeHtml()">Unescape HTML</button>
      <button class="tt-btn" (click)="escapeJson()">Escape JSON</button>
    </div>

    <label class="tool-label">Output</label>
    <textarea class="tool-area" rows="7" [value]="output" readonly placeholder="Hasil..."></textarea>

    <div class="tool-actions">
      <button class="btn-secondary" (click)="copy()" [disabled]="!output">Copy</button>
      <button class="btn-secondary" (click)="clear()">Clear</button>
    </div>
  </mat-card>
</div>

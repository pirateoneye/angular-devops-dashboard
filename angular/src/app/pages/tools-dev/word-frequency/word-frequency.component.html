<div class="container pt-3 pb-3">
  <mat-card class="tool-card">
    <h2 class="tool-title">Word Frequency</h2>
    <h4 class="tool-sub">Hitung frekuensi kata, buang stop-word (EN/ID), tampilkan bar chart &amp; statistik.</h4>
    <div class="tool-divider"></div>

    <label class="tool-label">Teks</label>
    <textarea class="tool-area" rows="6" [(ngModel)]="input" placeholder="Tempel teks di sini..."></textarea>

    <div class="cj-row">
      <label><input type="checkbox" [(ngModel)]="caseSensitive" /> Case-sensitive</label>
      <label><input type="checkbox" [(ngModel)]="ignoreStopWords" /> Buang stop-word</label>
      <label>Min len <input type="number" min="1" style="width:56px" [(ngModel)]="minLen" /></label>
      <label>Top <input type="number" min="1" style="width:56px" [(ngModel)]="topN" /></label>
      <label>Sort
        <select [(ngModel)]="sortMode">
          <option value="count">Count</option>
          <option value="alpha">Alphabet</option>
        </select>
      </label>
    </div>

    <div class="tool-actions">
      <button class="btn-secondary" (click)="example()">Contoh</button>
      <button class="btn-secondary" (click)="clear()">Clear</button>
    </div>

    <div class="tool-stats" *ngIf="input">{{ totalWords }} kata · {{ uniqueWords }} unik</div>

    <ng-container *ngIf="input && rows().length">
      <label class="tool-label" style="margin-top:10px">Frekuensi (top {{ rows().length }})</label>
      <div class="wf-list">
        <div class="wf-row" *ngFor="let r of rows()">
          <span class="wf-word"><code>{{ r.word }}</code></span>
          <div class="wf-bar-track"><div class="wf-bar" [style.width.%]="barWidth(r)"></div></div>
          <span class="wf-count">{{ r.count }}</span>
          <span class="wf-pct">{{ r.pct }}%</span>
        </div>
      </div>
    </ng-container>
    <div class="ts-hint" *ngIf="input && !rows().length">Tidak ada kata yang cocok dengan filter.</div>
  </mat-card>
</div>

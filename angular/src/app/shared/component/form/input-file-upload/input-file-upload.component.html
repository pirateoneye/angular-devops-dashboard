<!-- Area drop zone; klik area ini untuk memicu file input -->
<div class="drop-zone"(dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"(drop)="onDrop($event)"(click)="fileInput.click()" [class.drag-over]="event === 'onDragOver'">
    <p *ngIf="event !== 'onDragOver' && file == null">Drag dan drop file disini atau klik untuk memilih file</p>
    <p *ngIf="event !== 'onDragOver' && file != null" style="font-weight: 700;">{{file.name}}</p>
    <p *ngIf="event === 'onDragOver'">Drop file disini</p>
    <!-- <div>
        <progress [value]="progress" max="100"></progress>
        <span>{{ progress }}%</span>
    </div> -->
    <div *ngIf="progress > 0">
        <!-- <mat-progress-bar mode="determinate" [value]="progress"></mat-progress-bar> -->
        <progress  [value]="progress" max="100"></progress>
        <span>{{ progress }}%</span>
        <!-- <div class="progress-bar bg-info" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div> -->
    </div>


    <input type="file" #fileInput (change)="onFileSelected($event)" hidden>
</div>
 
<div class="d-flex flex-row-reverse">
    <button class="btn btn-success" [disabled]="file == null" (click)="uploadFile()">Upload File</button>
</div>

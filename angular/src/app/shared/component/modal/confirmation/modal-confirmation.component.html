<h2 mat-dialog-title  style="color: #144E83; font-family: 'Open Sans'; font-weight: 700;">{{data.title}}</h2>
<mat-dialog-content>
  <div [innerHTML]="data.message"></div>
</mat-dialog-content>
<mat-dialog-actions>
  <div style="display: flex; flex-direction: row; flex: auto; border: 1px #c3c3c3; border-style: solid none none;">
    <button class="cancel-button" [mat-dialog-close]="false">Tidak</button>
    <button class="ok-button" [mat-dialog-close]="true">Iya</button>
  </div>

</mat-dialog-actions>

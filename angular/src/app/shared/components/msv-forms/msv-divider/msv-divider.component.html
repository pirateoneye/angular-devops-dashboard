<div class="msv-divider" [ngClass]="dividerClasses">
  @if (!text || orientation === 'vertical') {
    <span class="divider-line"></span>
  }
  @if (text && orientation === 'horizontal') {
    <span class="divider-line"></span>
    <span class="divider-text">{{ text }}</span>
    <span class="divider-line"></span>
  }
</div>

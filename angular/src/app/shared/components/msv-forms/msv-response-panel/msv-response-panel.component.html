@if (response && response.status) {
  <div class="msv-response-panel">
    <div class="panel-header">
      <msv-status-badge [status]="response.status"></msv-status-badge>
    </div>

    @if (response.message) {
      <div class="panel-message">
        <span class="message-label">Response:</span>
        <span class="message-text">{{ response.message }}</span>
      </div>
    }

    @if (showData && hasData) {
      <div class="panel-data">
        <div class="data-label">Response Data:</div>
        <pre class="data-content">{{ formattedData }}</pre>
      </div>
    }
  </div>
}

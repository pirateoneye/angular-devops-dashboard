<div [class]="tagClass" class="tag">
  <span class="tag-content"><ng-content></ng-content></span>
  @if (removable) {
    <button class="tag-remove" (click)="onRemove()" type="button" aria-label="Remove tag">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 3L3 9M3 3L9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  }
</div>

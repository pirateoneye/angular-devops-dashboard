<div class="msv-textarea-container">
  @if (label) {
    <label class="msv-textarea-label">{{ label }}</label>
  }
  <textarea
    [placeholder]="placeholder"
    [value]="value"
    [disabled]="disabled"
    [rows]="rows"
    (input)="onInput($event)"
    (blur)="onBlur()"
    class="form-control"
    [class.is-invalid]="showError"
  ></textarea>
  @if (showError) {
    @if (errorTemplate) {
      <ng-container *ngTemplateOutlet="errorTemplate; context: {$implicit: errors}"></ng-container>
    } @else {
      <div class="msv-textarea-error">{{ errors[0] }}</div>
    }
  }
</div>

<div class="page-header">
  <h1>CI/CD Pipelines</h1>
  <p class="subtitle">Build, test, and deployment status</p>
</div>

<div *ngIf="loading" class="loading">Loading pipelines...</div>

<div *ngIf="!loading" class="pipelines">
  <div *ngFor="let pipe of pipelines" class="card pipeline-card">
    <div class="pipeline-header" (click)="toggleExpand(pipe.id)">
      <div class="pipeline-main">
        <span class="badge" [class]="statusClass(pipe.status)">
          <span class="status-dot" [class]="pipe.status === 'running' ? 'pending' : pipe.status === 'success' ? 'online' : pipe.status === 'failed' ? 'offline' : 'warning'"></span>
          {{pipe.status}}
        </span>
        <span class="pipe-name">{{pipe.name}}</span>
        <span class="pipe-meta">{{pipe.branch}} &#64; {{pipe.commit}} by {{pipe.author}}</span>
      </div>
      <div class="pipe-stats">
        <span class="pipe-duration">⏱ {{pipe.duration}}</span>
        <span class="pipe-time">{{pipe.startedAt | date:'shortTime'}}</span>
        <span class="expand-icon">{{expandedPipeline === pipe.id ? '▼' : '▶'}}</span>
      </div>
    </div>

    <div *ngIf="expandedPipeline === pipe.id" class="pipeline-stages">
      <div *ngFor="let stage of pipe.stages" class="stage">
        <div class="stage-status">
          <span class="status-dot" [class]="stage.status === 'running' ? 'pending' : stage.status === 'success' ? 'online' : stage.status === 'failed' ? 'offline' : 'warning'"></span>
        </div>
        <div class="stage-info">
          <span class="stage-name">{{stage.name}}</span>
          <span class="stage-duration">{{stage.duration}}</span>
        </div>
        <div class="stage-bar">
          <div class="stage-progress" [class]="statusClass(stage.status)"></div>
        </div>
      </div>
    </div>
  </div>
</div>

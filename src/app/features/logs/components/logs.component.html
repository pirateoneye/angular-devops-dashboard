<div class="page-header"><h1>Log Viewer</h1><p class="subtitle">Centralized logs with filtering & search</p></div>
<div class="filters">
  <select [ngModel]="filterService()" (ngModelChange)="service.setService($event)">
    <option value="">All Services</option><option *ngFor="let s of services()" [value]="s">{{s}}</option>
  </select>
  <select [ngModel]="filterLevel()" (ngModelChange)="service.setLevel($event)">
    <option value="">All Levels</option><option *ngFor="let l of levels()" [value]="l">{{l}}</option>
  </select>
  <input type="text" [ngModel]="searchText()" (ngModelChange)="service.setSearch($event)" placeholder="Search logs..." class="search-input">
  <button class="btn" (click)="clearFilters()">Clear</button>
  <span class="result-count">{{filteredLogs().length}} entries</span>
</div>
<div class="card logs-container">
  <div *ngFor="let log of filteredLogs()" class="log-line">
    <span class="timestamp">{{log.timestamp | date:'HH:mm:ss'}}</span>
    <span class="badge" [class]="levelClass(log.level).replace('level-', '')">{{log.level}}</span>
    <span class="log-service">[{{log.service}}]</span>
    <span [class]="levelClass(log.level)">{{log.message}}</span>
    <span *ngIf="log.traceId" class="log-trace">{{log.traceId}}</span>
  </div>
</div>
